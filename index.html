<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmazeD - Epic Multiplayer Labyrinth</title>
    <!-- Importazione del font Cinzel da Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --text-color: #c5c6c7;
            --accent-purple: #9b59b6;
            --accent-blue: #45a29e;
            --button-glow: rgba(155, 89, 182, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Cinzel', serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .logo {
            font-size: 5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(69, 162, 158, 0.5);
        }

        /* La "A" viola e luminosa */
        .logo .purple-a {
            color: var(--accent-purple);
            text-shadow: 0 0 20px var(--accent-purple);
        }

        /* Il resto della scritta in azzurro/ciano */
        .logo .blue-text {
            color: var(--accent-blue);
        }

        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 3rem;
            color: #a0a0a0;
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            background: transparent;
            border: 2px solid var(--accent-purple);
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px var(--button-glow);
            cursor: pointer;
            margin: 10px;
        }

        .cta-button:hover {
            background: var(--accent-purple);
            box-shadow: 0 0 30px var(--accent-purple);
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.5);
            font-size: 0.9rem;
        }

        footer a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: color 0.3s;
        }

        footer a:hover {
            color: var(--accent-purple);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span class="purple-a">A</span><span class="blue-text">mazeD</span>
        </div>
        <div class="subtitle">The Ultimate Split-Screen Multiplayer Experience</div>
        
        <div>
            <!-- Puoi inserire qui un link per scaricare il gioco o il link all'app store -->
            <a href="#play" class="cta-button">PLAY NOW</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 AmazeD. All rights reserved.</p>
        <p><a href="privacy.html">Privacy Policy</a></p>
    </footer>
</body>
</html>
